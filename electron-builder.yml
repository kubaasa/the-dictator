appId: com.jakubbruniecki.the-dictator
productName: The Dictator
copyright: Copyright © 2026 Jakub Bruniecki

electronVersion: 40.7.0

directories:
  output: out
  buildResources: assets

files:
  - dist/**/*
  - package.json

extraMetadata:
  main: dist/main/main.js

asar: true
asarUnpack:
  - "node_modules/uiohook-napi/**"
  - "node_modules/better-sqlite3/**"
  - "node_modules/onnxruntime-node/**"
  - "**/*.node"
  - "**/*.dll"

extraResources:
  - from: assets/icon.png
    to: icon.png
  - from: assets/icon.ico
    to: icon.ico

win:
  target: nsis
  icon: assets/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: false
  allowElevation: false
  license: assets/license.rtf
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerHeader: assets/nsis-header.bmp
  installerSidebar: assets/nsis-sidebar.bmp
  include: assets/installer.nsh
  runAfterFinish: true
  createDesktopShortcut: false
  createStartMenuShortcut: false

afterPack: scripts/after-pack.js

publish:
  provider: github
  owner: kubaasa
  repo: the-dictator
  releaseType: release
